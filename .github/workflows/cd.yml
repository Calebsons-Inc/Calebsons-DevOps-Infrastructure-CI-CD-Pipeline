name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: image
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/calebsons-devops-infra-ci-cd-pipeline"
          echo "repository=${image}" >> "${GITHUB_OUTPUT}"
          echo "sha_tag=${image}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "latest_tag=${image}:latest" >> "${GITHUB_OUTPUT}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform init, plan, and apply
        run: |
          terraform -chdir=infra/terraform init -input=false
          terraform -chdir=infra/terraform validate
          terraform -chdir=infra/terraform plan -input=false -var="image_name=${{ steps.image.outputs.sha_tag }}" -var="environment=production"
          terraform -chdir=infra/terraform apply -auto-approve -input=false -var="image_name=${{ steps.image.outputs.sha_tag }}" -var="environment=production"
